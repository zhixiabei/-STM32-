<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>自动售货机</title>
<style>
:root{--bg:#f5f5f5;--card:#fff;--text:#333;--sub:#888;--accent:#07c160;--danger:#e74c3c;--border:#e0e0e0;--shadow:0 2px 8px rgba(0,0,0,.08);--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;user-select:none}
.header{background:linear-gradient(135deg,#07c160,#06ad56);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(7,193,96,.3)}
.header .title{font-size:18px;font-weight:700}
.header .status{font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.25)}
.status.online{background:rgba(255,255,255,.35)}
.status.offline{background:rgba(231,76,60,.6);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.env-bar{display:flex;gap:10px;padding:12px 16px}
.env-item{flex:1;background:var(--card);border-radius:var(--radius);padding:10px;text-align:center;box-shadow:var(--shadow);font-size:14px}
.env-item .val{font-size:22px;font-weight:700;color:var(--accent)}
.env-item .lbl{font-size:11px;color:var(--sub);margin-top:2px}
.section-title{font-size:15px;font-weight:700;padding:8px 16px 4px}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:8px 16px 16px}
.product-card{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s;position:relative;border:2px solid transparent}
.product-card:active{transform:scale(.96)}
.product-card.selected{border-color:var(--accent)}
.product-card.sold-out{opacity:.5;pointer-events:none}
.product-card .emoji{font-size:42px;margin-bottom:6px}
.product-card .name{font-size:15px;font-weight:600}
.product-card .price{font-size:13px;color:var(--accent);margin:4px 0}
.product-card .stock{font-size:12px;color:var(--sub)}
.product-card .badge{position:absolute;top:8px;right:8px;background:var(--danger);color:#fff;font-size:10px;padding:2px 6px;border-radius:10px}
.bottom-bar{position:sticky;bottom:0;background:var(--card);padding:12px 16px;box-shadow:0 -2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;z-index:10}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-ctrl button{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:#fff;font-size:20px;font-weight:700;cursor:pointer;color:var(--text)}
.qty-ctrl .qty{font-size:20px;font-weight:700;min-width:28px;text-align:center}
.btn-buy{flex:1;background:var(--accent);color:#fff;border:none;border-radius:24px;padding:14px;font-size:17px;font-weight:700;cursor:pointer}
.btn-buy:active{opacity:.8}.btn-buy:disabled{background:#ccc}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:99;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:50;visibility:hidden;opacity:0;transition:.25s}
.overlay.show{visibility:visible;opacity:1}
.dialog{background:var(--card);border-radius:var(--radius);padding:24px;width:85vw;max-width:320px;text-align:center}
.dialog .dlg-emoji{font-size:48px}
.dialog .dlg-name{font-size:18px;font-weight:700;margin:8px 0}
.dialog .dlg-info{font-size:13px;color:var(--sub);margin-bottom:16px}
.dialog .dlg-btns{display:flex;gap:10px}
.dialog .dlg-btns button{flex:1;padding:12px;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer}
.btn-cancel{background:#f0f0f0;border:none;color:var(--text)}
.btn-confirm{background:var(--accent);border:none;color:#fff}
</style>
</head>
<body>

<div class="header">
  <span class="title">🛒 自动售货机</span>
  <span class="status offline" id="statusDot">等待连接</span>
</div>

<div class="env-bar">
  <div class="env-item"><div class="val" id="tempVal">--</div><div class="lbl">🌡 温度 °C</div></div>
  <div class="env-item"><div class="val" id="humiVal">--</div><div class="lbl">💧 湿度 %</div></div>
</div>

<div class="section-title">📦 选择商品</div>
<div class="product-grid" id="productGrid"></div>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <div class="dlg-emoji" id="dlgEmoji"></div>
    <div class="dlg-name" id="dlgName"></div>
    <div class="dlg-info" id="dlgInfo"></div>
    <div class="qty-ctrl" style="justify-content:center;margin-bottom:16px">
      <button onclick="changeQty(-1)">−</button>
      <span class="qty" id="dlgQty">1</span>
      <button onclick="changeQty(+1)">+</button>
    </div>
    <div class="dlg-btns">
      <button class="btn-cancel" onclick="closeDlg()">取消</button>
      <button class="btn-confirm" onclick="confirm()">确认下单 ¥<span id="dlgTotal">0</span></button>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <span style="font-size:13px;color:var(--sub)" id="bottomHint">👆 点击商品开始</span>
  <button class="btn-buy" id="btnBuy" disabled onclick="openDlg()">立即下单</button>
</div>

<script>
// ======================== 数据 ========================
let dev={t:null,h:null,Apple:null,Banana:null,Orange:null,Mango:null};
let sel=-1, qty=1, online=false;
const P=[{i:0,n:'Apple',e:'🍎',p:2},{i:2,n:'Banana',e:'🍌',p:1},{i:4,n:'Orange',e:'🍊',p:2},{i:6,n:'Mango',e:'🥭',p:3}];
function $(id){return document.getElementById(id)}

// ======================== API ========================
async function fetchData(){
  try{
    let r=await fetch('/data'), j=await r.json();
    online=j.connected;
    if(j.data){
      let d=j.data, ch=false;
      ['t','h'].forEach(k=>{if(d[k]=='temp'?d.temp!=null:d.humi!=null){let v=Number(k=='t'?d.temp:d.humi);if(!isNaN(v)&&dev[k]!==v){dev[k]=v;ch=true}}});
      // temp/humi 在 OneNET JSON 里是小写 key
      if(d.temp!=null){let v=Number(d.temp);if(!isNaN(v)&&dev.t!==v){dev.t=v;ch=true}}
      if(d.humi!=null){let v=Number(d.humi);if(!isNaN(v)&&dev.h!==v){dev.h=v;ch=true}}
      P.forEach(x=>{if(d[x.n]!=null){let v=Number(d[x.n]);if(!isNaN(v)&&dev[x.n]!==v){dev[x.n]=v;ch=true}}});
      if(ch||dev.t==null){$('tempVal').textContent=dev.t??'--';$('humiVal').textContent=dev.h??'--';render()}
    }
    setSt(online);
  }catch(e){setSt(false)}
}

async function sendDispense(idx){
  try{
    let r=await fetch('/dispense',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({idx})});
    let j=await r.json();
    if(j.ok){toast('✅ 命令已发送，观察设备出货',2500);setTimeout(fetchData,3000)}
    else toast('❌ '+j.msg,3000);
  }catch(e){toast('❌ 发送失败: '+e.message,3000)}
}

// ======================== UI ========================
function toast(msg,ms=2000){let t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),ms)}
function setSt(on){let d=$('statusDot');d.textContent=on?'● 已连接':'未连接';d.className='status '+(on?'online':'offline')}
function render(){
  $('productGrid').innerHTML=P.map(x=>{
    let s=dev[x.n]??'--', so=typeof s==='number'&&s<=0;
    return`<div class="product-card${x.i===sel?' selected':''}${so?' sold-out':''}" onclick="pick(${x.i})">${so?'<div class="badge">售罄</div>':''}<div class="emoji">${x.e}</div><div class="name">${x.n}</div><div class="price">¥${x.p}</div><div class="stock">库存: ${s}</div></div>`
  }).join('');upBar()}
function pick(i){let x=P.find(y=>y.i===i);if(typeof dev[x.n]==='number'&&dev[x.n]<=0){toast('售罄');return}sel=i;qty=1;render();upBar()}
function upBar(){let h=$('bottomHint'),b=$('btnBuy');if(sel<0){h.textContent='👆 点击商品开始';b.disabled=true;b.textContent='立即下单'}else{let x=P.find(y=>y.i===sel);h.textContent=`已选: ${x.e} ${x.n}`;b.disabled=false;b.textContent=`立即下单 ¥${x.p*qty}`}}
function openDlg(){if(sel<0)return;let x=P.find(y=>y.i===sel);qty=1;$('dlgEmoji').textContent=x.e;$('dlgName').textContent=x.n;$('dlgInfo').textContent=`单价 ¥${x.p} | 库存 ${dev[x.n]??'?'}`;upDlg();$('overlay').classList.add('show')}
function closeDlg(){$('overlay').classList.remove('show')}
function changeQty(d){let x=P.find(y=>y.i===sel),m=typeof dev[x.n]==='number'?dev[x.n]:99;qty=Math.max(1,Math.min(m,qty+d));upDlg();upBar()}
function upDlg(){let x=P.find(y=>y.i===sel);$('dlgQty').textContent=qty;$('dlgTotal').textContent=x.p*qty}
async function confirm(){let x=P.find(y=>y.i===sel),t=x.p*qty;closeDlg();toast(`🔄 正在发送命令...`,3000);await sendDispense(x.i);sel=-1;qty=1;render()}

// ======================== 启动 ========================
render();
fetchData();
setInterval(fetchData, 5000);
</script>
</body>
</html>
