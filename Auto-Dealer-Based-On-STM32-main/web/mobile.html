<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>自动售货机</title>
<style>
  :root {
    --bg:    #f5f5f5;
    --card:  #ffffff;
    --text:  #333333;
    --sub:   #888888;
    --accent:#07c160;
    --danger:#e74c3c;
    --warn:  #f39c12;
    --border:#e0e0e0;
    --shadow:0 2px 8px rgba(0,0,0,.08);
    --radius:12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }

  /* ── 顶部状态栏 ── */
  .header {
    background:linear-gradient(135deg, #07c160, #06ad56);
    color:#fff;
    padding:12px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:10;
    box-shadow:0 2px 8px rgba(7,193,96,.3);
  }
  .header .title { font-size:18px; font-weight:700; }
  .header .status {
    font-size:12px;
    padding:4px 10px;
    border-radius:20px;
    background:rgba(255,255,255,.25);
  }
  .status.online { background:rgba(255,255,255,.35); }
  .status.offline { background:rgba(231,76,60,.6); animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ── 温湿度栏 ── */
  .env-bar {
    display:flex;
    gap:10px;
    padding:12px 16px;
  }
  .env-item {
    flex:1;
    background:var(--card);
    border-radius:var(--radius);
    padding:10px;
    text-align:center;
    box-shadow:var(--shadow);
    font-size:14px;
  }
  .env-item .val { font-size:22px; font-weight:700; color:var(--accent); }
  .env-item .lbl { font-size:11px; color:var(--sub); margin-top:2px; }

  /* ── 商品网格 ── */
  .section-title {
    font-size:15px;
    font-weight:700;
    padding:8px 16px 4px;
    color:var(--text);
  }
  .product-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:8px 16px 16px;
  }
  .product-card {
    background:var(--card);
    border-radius:var(--radius);
    padding:16px;
    text-align:center;
    box-shadow:var(--shadow);
    cursor:pointer;
    transition:transform .15s, box-shadow .15s;
    position:relative;
    border:2px solid transparent;
  }
  .product-card:active { transform:scale(.96); box-shadow:0 1px 3px rgba(0,0,0,.12); }
  .product-card.selected { border-color:var(--accent); }
  .product-card.sold-out { opacity:.5; pointer-events:none; }
  .product-card .emoji { font-size:42px; margin-bottom:6px; }
  .product-card .name  { font-size:15px; font-weight:600; }
  .product-card .price { font-size:13px; color:var(--accent); margin:4px 0; }
  .product-card .stock { font-size:12px; color:var(--sub); }
  .product-card .badge {
    position:absolute; top:8px; right:8px;
    background:var(--danger); color:#fff; font-size:10px;
    padding:2px 6px; border-radius:10px;
  }

  /* ── 底部操作栏 ── */
  .bottom-bar {
    position:sticky;
    bottom:0;
    background:var(--card);
    padding:12px 16px;
    box-shadow:0 -2px 8px rgba(0,0,0,.08);
    display:flex;
    align-items:center;
    gap:12px;
    z-index:10;
  }
  .qty-ctrl {
    display:flex;
    align-items:center;
    gap:8px;
  }
  .qty-ctrl button {
    width:36px; height:36px; border-radius:50%;
    border:2px solid var(--border); background:#fff;
    font-size:20px; font-weight:700; line-height:1;
    cursor:pointer; color:var(--text);
  }
  .qty-ctrl button:active { background:#f0f0f0; }
  .qty-ctrl .qty { font-size:20px; font-weight:700; min-width:28px; text-align:center; }
  .btn-buy {
    flex:1;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:24px;
    padding:14px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:opacity .2s;
  }
  .btn-buy:active { opacity:.8; }
  .btn-buy:disabled { background:#ccc; }

  /* ── Toast ── */
  .toast {
    position:fixed; top:60px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.8); color:#fff;
    padding:10px 24px; border-radius:20px;
    font-size:14px; z-index:99; pointer-events:none;
    opacity:0; transition:opacity .3s;
  }
  .toast.show { opacity:1; }

  /* ── 遮罩弹窗 ── */
  .overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.5);
    display:flex; align-items:center; justify-content:center;
    z-index:50; visibility:hidden; opacity:0; transition:.25s;
  }
  .overlay.show { visibility:visible; opacity:1; }
  .dialog {
    background:var(--card); border-radius:var(--radius);
    padding:24px; width:85vw; max-width:320px; text-align:center;
  }
  .dialog .dlg-emoji { font-size:48px; }
  .dialog .dlg-name  { font-size:18px; font-weight:700; margin:8px 0; }
  .dialog .dlg-info  { font-size:13px; color:var(--sub); margin-bottom:16px; }
  .dialog .dlg-btns  { display:flex; gap:10px; }
  .dialog .dlg-btns button {
    flex:1; padding:12px; border-radius:24px; font-size:15px; font-weight:600; cursor:pointer;
  }
  .btn-cancel { background:#f0f0f0; border:none; color:var(--text); }
  .btn-confirm{ background:var(--accent); border:none; color:#fff; }

  /* ── 配置面板 ── */
  .config-toggle {
    position:fixed; bottom:80px; right:16px;
    width:40px; height:40px; border-radius:50%;
    background:var(--card); box-shadow:var(--shadow);
    border:none; font-size:20px; cursor:pointer; z-index:20;
  }
  .config-panel {
    position:fixed; bottom:130px; right:16px; left:16px;
    background:var(--card); border-radius:var(--radius);
    padding:16px; box-shadow:0 4px 16px rgba(0,0,0,.15);
    z-index:20; display:none;
    max-width:360px; margin-left:auto;
  }
  .config-panel.show { display:block; }
  .config-panel label { font-size:12px; color:var(--sub); display:block; margin-top:8px; }
  .config-panel input {
    width:100%; padding:8px; margin-top:4px; border:1px solid var(--border);
    border-radius:8px; font-size:14px;
  }
  .config-panel .btn-save {
    width:100%; margin-top:12px; padding:10px;
    background:var(--accent); color:#fff; border:none;
    border-radius:20px; font-size:14px; font-weight:600; cursor:pointer;
  }
</style>
</head>
<body>

<!-- 顶部 -->
<div class="header">
  <span class="title">🛒 自动售货机</span>
  <span class="status offline" id="statusDot">未连接</span>
</div>

<!-- 温湿度 -->
<div class="env-bar">
  <div class="env-item">
    <div class="val" id="tempVal">--</div>
    <div class="lbl">🌡 温度 °C</div>
  </div>
  <div class="env-item">
    <div class="val" id="humiVal">--</div>
    <div class="lbl">💧 湿度 %</div>
  </div>
</div>

<!-- 商品列表 -->
<div class="section-title">📦 选择商品</div>
<div class="product-grid" id="productGrid"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 下单确认弹窗 -->
<div class="overlay" id="overlay">
  <div class="dialog">
    <div class="dlg-emoji" id="dlgEmoji"></div>
    <div class="dlg-name"  id="dlgName"></div>
    <div class="dlg-info"  id="dlgInfo"></div>
    <div class="qty-ctrl" style="justify-content:center;margin-bottom:16px;">
      <button onclick="changeDlgQty(-1)">−</button>
      <span class="qty" id="dlgQty">1</span>
      <button onclick="changeDlgQty(+1)">+</button>
    </div>
    <div class="dlg-btns">
      <button class="btn-cancel"  onclick="closeDialog()">取消</button>
      <button class="btn-confirm" onclick="confirmOrder()">确认下单 ¥<span id="dlgTotal">0</span></button>
    </div>
  </div>
</div>

<!-- 底部操作栏 -->
<div class="bottom-bar" id="bottomBar">
  <span style="font-size:13px;color:var(--sub);" id="bottomHint">👆 点击商品开始</span>
  <button class="btn-buy" id="btnBuy" disabled onclick="openDialog()">立即下单</button>
</div>

<!-- ⚙ 配置按钮 -->
<button class="config-toggle" onclick="toggleConfig()" title="设置">⚙</button>
<div class="config-panel" id="configPanel">
  <label>MQTT WebSocket 地址</label>
  <input id="cfgBroker" placeholder="wss://mqtts.heclouds.com:8083/mqtt">
  <label>产品 ID</label>
  <input id="cfgProductId" placeholder="gtx9E8EU09">
  <label>设备名称</label>
  <input id="cfgDeviceName" placeholder="dev1">
  <label>MQTT 密码 (Token)</label>
  <input id="cfgPassword" placeholder="version=2018-10-31&res=...">
  <button class="btn-save" onclick="saveConfig()">💾 保存并重连</button>
</div>

<!-- 凭据（secret.js 不提交 Git；缺失则手动在 ⚙ 配置） -->
<script src="secret.js"></script>
<!-- Paho MQTT -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

<script>
// ======================== 配置 ========================
const DEFAULT_CONFIG = (typeof VENDING_SECRETS !== 'undefined')
  ? { ...VENDING_SECRETS }
  : {
      broker:    'wss://mqtts.heclouds.com:8083/mqtt',
      productId: 'YOUR_PRODUCT_ID',
      deviceName:'YOUR_DEVICE_NAME',
      password:  'YOUR_MQTT_PASSWORD_TOKEN',
    };

function getConfig() {
  try {
    const saved = localStorage.getItem('vending_config');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return {...DEFAULT_CONFIG};
}

let cfg = getConfig();
let mqttClient = null;
let selectedIdx  = -1;  // 库存索引 (0,2,4,6)
let dlgQty       = 1;

// 商品定义: { idx, name, emoji, price }
const PRODUCTS = [
  { idx:0, name:'Apple',  emoji:'🍎', price:2 },
  { idx:2, name:'Banana', emoji:'🍌', price:1 },
  { idx:4, name:'Orange', emoji:'🍊', price:2 },
  { idx:6, name:'Mango',  emoji:'🥭', price:3 },
];

// 实时数据
let devData = {
  temp: null, humi: null,
  Apple: null, Banana: null, Orange: null, Mango: null
};

// ======================== UI 工具 ========================
function $(id) { return document.getElementById(id); }

function toast(msg, ms=2000) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), ms);
}

function renderProducts() {
  const grid = $('productGrid');
  grid.innerHTML = PRODUCTS.map(p => {
    const stock = devData[p.name] ?? '--';
    const soldOut = (typeof stock === 'number' && stock <= 0);
    const sel = (p.idx === selectedIdx) ? ' selected' : '';
    const so = soldOut ? ' sold-out' : '';
    const badge = soldOut ? '<div class="badge">售罄</div>' : '';
    return `
      <div class="product-card${sel}${so}" onclick="selectProduct(${p.idx})">
        ${badge}
        <div class="emoji">${p.emoji}</div>
        <div class="name">${p.name}</div>
        <div class="price">¥${p.price}</div>
        <div class="stock">库存: ${stock}</div>
      </div>`;
  }).join('');

  updateBottomBar();
}

function selectProduct(idx) {
  const p = PRODUCTS.find(x => x.idx === idx);
  const stock = devData[p.name];
  if (typeof stock === 'number' && stock <= 0) {
    toast('该商品已售罄');
    return;
  }
  selectedIdx = idx;
  dlgQty = 1;
  renderProducts();
  updateBottomBar();
}

function updateBottomBar() {
  const hint = $('bottomHint');
  const btn  = $('btnBuy');
  if (selectedIdx < 0) {
    hint.textContent = '👆 点击商品开始';
    btn.disabled = true;
    btn.textContent = '立即下单';
  } else {
    const p = PRODUCTS.find(x => x.idx === selectedIdx);
    hint.textContent = `已选: ${p.emoji} ${p.name}`;
    btn.disabled = false;
    btn.textContent = `立即下单 ¥${p.price * dlgQty}`;
  }
}

function openDialog() {
  if (selectedIdx < 0) return;
  const p = PRODUCTS.find(x => x.idx === selectedIdx);
  dlgQty = 1;
  $('dlgEmoji').textContent = p.emoji;
  $('dlgName').textContent  = p.name;
  $('dlgInfo').textContent  = `单价 ¥${p.price}  |  库存 ${devData[p.name] ?? '?'}`;
  updateDlgDisplay();
  $('overlay').classList.add('show');
}

function closeDialog() {
  $('overlay').classList.remove('show');
}

function changeDlgQty(delta) {
  const p = PRODUCTS.find(x => x.idx === selectedIdx);
  const max = (typeof devData[p.name] === 'number') ? devData[p.name] : 99;
  dlgQty = Math.max(1, Math.min(max, dlgQty + delta));
  updateDlgDisplay();
  updateBottomBar();
}

function updateDlgDisplay() {
  const p = PRODUCTS.find(x => x.idx === selectedIdx);
  $('dlgQty').textContent = dlgQty;
  $('dlgTotal').textContent = p.price * dlgQty;
}

function confirmOrder() {
  const p = PRODUCTS.find(x => x.idx === selectedIdx);
  const total = p.price * dlgQty;
  closeDialog();

  // 发送 DISPENSE_X 命令（如有多个数量，循环发送）
  sendDispense(p.idx, dlgQty);

  toast(`✅ 已下单: ${p.name} x${dlgQty}  ¥${total}`, 3000);
  selectedIdx = -1;
  dlgQty = 1;
  renderProducts();
}

// ======================== MQTT ========================
function sendDispense(idx, count) {
  if (!mqttClient || !mqttClient.isConnected()) {
    toast('❌ 未连接设备，请检查网络', 2500);
    return;
  }
  const topic = `$sys/${cfg.productId}/${cfg.deviceName}/thing/property/set`;
  for (let i = 0; i < count; i++) {
    // 每个 DISPENSE 间隔 3 秒（电机转 2.5 秒 + 余量）
    const delay = i * 3100;
    setTimeout(() => {
      const payload = JSON.stringify({
        id: String(Date.now()),
        version: '1.0',
        params: { dispense_cmd: { value: `DISPENSE_${idx}` } }
      });
      const msg = new Paho.MQTT.Message(payload);
      msg.destinationName = topic;
      msg.qos = 0;
      mqttClient.send(msg);
      console.log('📤', topic, payload);
    }, delay);
  }
  if (count > 1) {
    toast(`🔄 正在出货 ${count} 次，请稍候...`, count * 3200);
  }
}

function connectMQTT() {
  const brokerUrl = cfg.broker;
  // Paho 需要 host + port 分开
  let host, port, useSSL;
  try {
    const u = new URL(brokerUrl);
    host   = u.hostname;
    port   = Number(u.port) || (u.protocol === 'wss:' ? 443 : 80);
    useSSL = (u.protocol === 'wss:');
  } catch(e) {
    host = 'mqtts.heclouds.com';
    port = 8083;
    useSSL = true;
  }

  const clientId = cfg.deviceName + '_web_' + Math.random().toString(36).slice(2, 8);
  mqttClient = new Paho.MQTT.Client(host, port, '/mqtt', clientId);

  mqttClient.onConnectionLost = (resp) => {
    console.warn('⚠ MQTT 断开:', resp.errorMessage);
    setStatus(false);
    // 5 秒后自动重连
    setTimeout(connectMQTT, 5000);
  };

  mqttClient.onMessageArrived = (msg) => {
    console.log('📥', msg.destinationName, msg.payloadString);
    handleMessage(msg.destinationName, msg.payloadString);
  };

  const opts = {
    useSSL: useSSL,
    userName: cfg.productId,
    password: cfg.password,
    timeout: 10,
    keepAliveInterval: 60,
    cleanSession: true,
    onSuccess: () => {
      console.log('✅ MQTT 已连接');
      setStatus(true);

      // 订阅数据上报 topic
      const dataTopic = `$sys/${cfg.productId}/${cfg.deviceName}/thing/property/post`;
      mqttClient.subscribe(dataTopic, { qos: 0 });

      // 也订阅属性设置回复
      const replyTopic = `$sys/${cfg.productId}/${cfg.deviceName}/thing/property/set_reply`;
      mqttClient.subscribe(replyTopic, { qos: 0 });

      toast('✅ 已连接到售货机');
    },
    onFailure: (err) => {
      console.error('❌ MQTT 连接失败:', err.errorMessage);
      setStatus(false);
      toast('❌ 连接失败: ' + err.errorMessage, 3000);
      // 10 秒后重试
      setTimeout(connectMQTT, 10000);
    }
  };

  console.log('🔗 连接 MQTT:', `${useSSL?'wss':'ws'}://${host}:${port}/mqtt`);
  mqttClient.connect(opts);
}

function setStatus(online) {
  const dot = $('statusDot');
  dot.textContent = online ? '● 已连接' : '未连接';
  dot.className = 'status ' + (online ? 'online' : 'offline');
}

function handleMessage(topic, payload) {
  // 解析 OneNET 属性上报 JSON
  try {
    const json = JSON.parse(payload);
    const params = json.params || json.data?.params || json;
    let changed = false;
    PRODUCTS.forEach(p => {
      if (params[p.name] && typeof params[p.name].value !== 'undefined') {
        const v = params[p.name].value;
        if (devData[p.name] !== v) { devData[p.name] = v; changed = true; }
      }
    });
    if (params.temp && typeof params.temp.value !== 'undefined') {
      const v = params.temp.value;
      if (devData.temp !== v) { devData.temp = v; changed = true; }
    }
    if (params.humi && typeof params.humi.value !== 'undefined') {
      const v = params.humi.value;
      if (devData.humi !== v) { devData.humi = v; changed = true; }
    }
    if (changed) {
      $('tempVal').textContent = devData.temp ?? '--';
      $('humiVal').textContent = devData.humi ?? '--';
      renderProducts();
    }
  } catch(e) {
    // 非 JSON 负载，忽略
    console.log('⚠ 无法解析:', payload.substring(0, 80));
  }
}

// ======================== 配置面板 ========================
function toggleConfig() {
  $('configPanel').classList.toggle('show');
}

function loadConfigUI() {
  $('cfgBroker').value    = cfg.broker;
  $('cfgProductId').value = cfg.productId;
  $('cfgDeviceName').value= cfg.deviceName;
  $('cfgPassword').value  = cfg.password;
}

function saveConfig() {
  cfg.broker     = $('cfgBroker').value.trim()     || DEFAULT_CONFIG.broker;
  cfg.productId  = $('cfgProductId').value.trim()  || DEFAULT_CONFIG.productId;
  cfg.deviceName = $('cfgDeviceName').value.trim() || DEFAULT_CONFIG.deviceName;
  cfg.password   = $('cfgPassword').value.trim()   || DEFAULT_CONFIG.password;
  localStorage.setItem('vending_config', JSON.stringify(cfg));
  $('configPanel').classList.remove('show');
  toast('⚙ 配置已保存，重新连接...', 1500);
  // 断开重连
  if (mqttClient && mqttClient.isConnected()) {
    mqttClient.disconnect();
  }
  setTimeout(connectMQTT, 800);
}

// ======================== 启动 ========================
loadConfigUI();
renderProducts();
connectMQTT();
</script>
</body>
</html>
